<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SASUKE TYPING</title>
<style>

body{
background:#001a2e;
color:white;
font-family:sans-serif;
text-align:center;
}

#game{
display:none;
}

input{
font-size:24px;
padding:10px;
width:300px;
}

</style>
</head>

<body>

<h1>SASUKE TYPING</h1>

<button onclick="startGame()">START</button>

<div id="game">

<h2 id="word"></h2>

<input id="input">

</div>

<script>

const words=[
"ぷりずむしーそー",
"ろーりんぐひる",
"どらごんぐらいだー",
"そりたつかべ"
]

let i=0

function startGame(){

document.getElementById("game").style.display="block"

loadWord()

}

function loadWord(){

document.getElementById("word").innerText=words[i]

}

document.getElementById("input").addEventListener("input",()=>{

if(document.getElementById("input").value===words[i]){

i++

if(i>=words.length){

alert("クリア！！")
location.reload()

}

loadWord()

document.getElementById("input").value=""

}

})

</script>

</body>
</html>
